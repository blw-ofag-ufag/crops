<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINDAS Data Cubes: Mapping Progress</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 {
            margin-bottom: 5px;
        }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.25rem; margin-top: 40px; border-top: 1px solid #eaeaea; padding-top: 20px; }
        
        p.subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .status-message {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: #888;
        }
        .error {
            color: #d32f2f !important;
            font-style: normal !important;
        }
        
        /* Chart Wrapper */
        .chart-wrapper {
            position: relative;
            height: 600px;
            width: 100%;
            display: none; 
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Unmapped Lists Styles */
        #unmapped-section { display: none; }
        details.cube-details {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        details.cube-details summary {
            padding: 15px;
            font-weight: 600;
            cursor: pointer;
            background: #f9f9f9;
            transition: background 0.2s ease;
        }
        details.cube-details summary:hover { background: #f1f1f1; }
        .unmapped-list {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .unmapped-list li {
            padding: 10px 15px;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .unmapped-list li:nth-child(even) { background: #fafafa; }
        .obs-name { font-weight: 600; color: #2c3e50; }
        .obs-uri { color: #1976d2; word-break: break-all; font-family: monospace; }
        .badge-success { color: #4CAF50; font-weight: normal; font-size: 0.9em; float: right; }
        .badge-warning { color: #f57c00; font-weight: normal; font-size: 0.9em; float: right; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>Cube Mapping Progress</h1>
    <p class="subtitle">Percentage and absolute counts of observations linked to a cultivation type.</p>
    
    <div id="chart-status" class="status-message">Executing SPARQL query for mapping progress. Please wait...</div>
    
    <div class="chart-wrapper" id="chartWrapper">
        <canvas id="progressChart"></canvas>
    </div>

    <div id="unmapped-section">
        <h2>Unmapped Observations by Cube</h2>
        <div id="list-status" class="status-message">Fetching unmapped observation details...</div>
        <div id="unmappedListsContainer"></div>
    </div>
</div>

<script>
    const endpointUrl = 'https://agriculture.ld.admin.ch/query';
    
    // 1. Query for Chart Aggregation
    const sparqlStatsQuery = `
        PREFIX : <https://agriculture.ld.admin.ch/crops/>
        PREFIX cube: <https://cube.link/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX schema: <http://schema.org/>

        SELECT ?cube ?cubeName (COUNT(DISTINCT ?observation) AS ?totalObservations) (COUNT(DISTINCT ?mappedObservation) AS ?mappedObservations)
        FROM <https://lindas.admin.ch/foag/crops>
        WHERE {
            ?cube a cube:Cube ;
                  cube:observationSet ?observationset ;
                  schema:name ?cubeName .
            
            ?observationset cube:observation ?observation .
            
            OPTIONAL {
                ?observation :cultivationType ?cultivationtype .
                ?cultivationtype rdfs:subClassOf* :Cultivation .
                BIND(?observation AS ?mappedObservation)
            }
            FILTER(LANG(?cubeName)="de")
        }
        GROUP BY ?cube ?cubeName
    `;

    // 2. Query for Unmapped Item Details
    const sparqlUnmappedQuery = `
        PREFIX : <https://agriculture.ld.admin.ch/crops/>
        PREFIX cube: <https://cube.link/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX schema: <http://schema.org/>

        SELECT ?cubeName ?unmappedObservation ?observationName
        FROM <https://lindas.admin.ch/foag/crops>
        WHERE {
            ?cube a cube:Cube ;
                  cube:observationSet ?observationset ;
                  schema:name ?cubeName .
            FILTER(LANG(?cubeName)="de")
            
            ?observationset cube:observation ?unmappedObservation .
            
            # Filter out observations that ARE mapped
            FILTER NOT EXISTS {
                ?unmappedObservation :cultivationType ?cultivationtype .
                ?cultivationtype rdfs:subClassOf* :Cultivation .
            }
            
            # Attempt to grab the German name
            OPTIONAL {
                ?unmappedObservation schema:name ?observationName .
                FILTER(LANG(?observationName)="de")
            }
        }
        ORDER BY ?cubeName ?observationName
    `;

    // Initialize application
    window.onload = () => {
        fetchStatsData();
    };

    // --- Phase 1: Fetch and Render Chart ---
    async function fetchStatsData() {
        const chartStatus = document.getElementById('chart-status');
        try {
            const response = await fetch(endpointUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Accept': 'application/sparql-results+json'
                },
                body: 'query=' + encodeURIComponent(sparqlStatsQuery)
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const rawData = await response.json();
            processAndVisualize(rawData.results.bindings);
            
            chartStatus.style.display = 'none';
            document.getElementById('chartWrapper').style.display = 'block';
            document.getElementById('unmapped-section').style.display = 'block';

            // Once the chart is done, load the heavy list data
            fetchUnmappedDetails();

        } catch (error) {
            console.error('Stats Fetch failed:', error);
            chartStatus.innerHTML = `<strong>Error:</strong> Failed to fetch progress data. <br> ${error.message}`;
            chartStatus.className = 'status-message error';
        }
    }

    function processAndVisualize(bindings) {
        const datasets = bindings.map(row => {
            const total = parseInt(row.totalObservations.value, 10);
            const mapped = parseInt(row.mappedObservations.value, 10);
            return {
                name: row.cubeName.value,
                total: total,
                mapped: mapped,
                unmapped: total - mapped,
                percentage: total > 0 ? parseFloat(((mapped / total) * 100).toFixed(2)) : 0
            };
        });

        datasets.sort((a, b) => b.percentage - a.percentage);

        const ctx = document.getElementById('progressChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: datasets.map(d => d.name),
                datasets: [
                    {
                        label: 'Mapped Observations',
                        data: datasets.map(d => d.mapped),
                        backgroundColor: '#4CAF50',
                        borderWidth: 1
                    },
                    {
                        label: 'Unmapped Observations',
                        data: datasets.map(d => d.unmapped),
                        backgroundColor: '#e0e0e0',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                scales: {
                    x: { stacked: true, title: { display: true, text: 'Absolute Number of Observations' } },
                    y: { stacked: true }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const cubeData = datasets[context.dataIndex];
                                const isMapped = context.datasetIndex === 0;
                                const pct = isMapped ? cubeData.percentage : (100 - cubeData.percentage).toFixed(2);
                                return `${context.dataset.label}: ${context.raw.toLocaleString()} (${pct}%)`;
                            },
                            afterBody: function(context) {
                                return `\nTotal Observations: ${datasets[context[0].dataIndex].total.toLocaleString()}`;
                            }
                        }
                    }
                }
            }
        });
    }

    // --- Phase 2: Fetch and Render Unmapped Details ---
    async function fetchUnmappedDetails() {
        const listStatus = document.getElementById('list-status');
        try {
            const response = await fetch(endpointUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Accept': 'application/sparql-results+json'
                },
                body: 'query=' + encodeURIComponent(sparqlUnmappedQuery)
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const rawData = await response.json();
            renderUnmappedLists(rawData.results.bindings);
            listStatus.style.display = 'none';

        } catch (error) {
            console.error('List Fetch failed:', error);
            listStatus.innerHTML = `<strong>Error:</strong> Failed to fetch unmapped details. <br> ${error.message}`;
            listStatus.className = 'status-message error';
        }
    }

    function renderUnmappedLists(bindings) {
        const container = document.getElementById('unmappedListsContainer');
        const grouped = {};

        // Group unmapped observations by Cube Name
        bindings.forEach(row => {
            const cubeName = row.cubeName.value;
            if (!grouped[cubeName]) {
                grouped[cubeName] = [];
            }
            grouped[cubeName].push({
                uri: row.unmappedObservation.value,
                name: row.observationName ? row.observationName.value : '(Kein deutscher Name verfügbar)'
            });
        });

        if (Object.keys(grouped).length === 0) {
            container.innerHTML = '<p style="text-align: center; color: #4CAF50;">All observations across all cubes are successfully mapped!</p>';
            return;
        }

        // Generate HTML Accordions
        let htmlContent = '';
        for (const [cubeName, observations] of Object.entries(grouped)) {
            htmlContent += `
                <details class="cube-details">
                    <summary>
                        ${cubeName} 
                        <span class="badge-warning">${observations.length} Unmapped</span>
                    </summary>
                    <ul class="unmapped-list">
                        ${observations.map(obs => `
                            <li>
                                <span class="obs-name">${obs.name}</span>
                                <a href="${obs.uri}" target="_blank" class="obs-uri">${obs.uri}</a>
                            </li>
                        `).join('')}
                    </ul>
                </details>
            `;
        }
        
        container.innerHTML = htmlContent;
    }
</script>

</body>
</html>
